{% extends "base.html" %}
{% block content %}

<div class="container mt-5">
    <h2 class="mb-4">Post a New Product</h2>

    <form method="POST" action="{{ url_for('views.post_product') }}">

        <!-- Title -->
        <div class="mb-3">
            <label for="title" class="form-label">Title</label>
            <input type="text" name="title" id="title" class="form-control" placeholder="Enter product title" required>
        </div>

        <!-- Description -->
        <div class="mb-3">
            <label for="description" class="form-label">Description</label>
            <textarea name="description" id="description" class="form-control" rows="4" placeholder="Describe your item" required></textarea>
        </div>

        <!-- Price -->
        <div class="mb-3">
            <label for="price" class="form-label">Price (CAD)</label>
            <input type="number" step="0.01" name="price" id="price" class="form-control" placeholder="e.g. 25.00" required>
        </div>

        <!-- Image URL -->
        <div class="mb-3">
            <label for="image_url" class="form-label">Image URL</label>
            <input type="url" name="image_url" id="image_url" class="form-control" placeholder="https://example.com/image.jpg">
        </div>

        <!-- Category -->
        <div class="mb-3">
            <label for="category_id" class="form-label">Category</label>
            <select name="category_id" id="category_id" class="form-select" required>
                {% for category in categories %}
                <option value="{{ category.id }}">{{ category.name }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- Submit button -->
        <button type="submit" class="btn btn-primary">Post Product</button>
    </form>
</div>

{% endblock %}
